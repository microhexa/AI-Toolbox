<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Toolbox | Room 1</title>
  <link rel="icon" href="./images/hammer_19.png">
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/rule-based-ai.css">
</head>
<body class="rule-quiz-body">
  <div class="page rule-page rule-quiz-page">
    <button id="return-btn" class="level-back-button rule-return-button" type="button" data-i18n="menuBack">Back</button>
    <div class="rule-page-title">
      <h1 data-i18n="rulesTitle">Rule-based AI</h1>
    </div>

    <main id="rule-based-ai-shell" class="focus rule-quiz-shell">
      <section class="rule-stage" aria-labelledby="answer-panel-title">
        <h2 id="answer-panel-title" class="rule-question" data-i18n="rulesPredictionQuestion">What will the AI choose?</h2>
        <div class="rule-play-area">
          <div class="rule-progress" id="rule-progress" aria-label="Round progress"></div>
          <div class="rule-canvas-shell">
            <div class="rule-canvas-stage">
              <div id="rule-sequence-callout" class="rule-sequence-callout" hidden aria-live="polite">
                <p id="rule-sequence-step-count" class="rule-sequence-step-count">Rule check 1/3</p>
                <p id="rule-sequence-step-text" class="rule-sequence-step-text">The drawing is wider than it is tall.</p>
              </div>
              <canvas id="quiz-doodle" width="320" height="320" aria-label="Doodle to classify"></canvas>
              <canvas id="quiz-doodle-overlay" width="320" height="320" aria-hidden="true" hidden></canvas>
            </div>
          </div>
          <div class="answer-options" role="list">
            <button class="answer-option" type="button" data-answer="labelSun" data-i18n="labelSun">Sun</button>
            <button class="answer-option" type="button" data-answer="labelHouse" data-i18n="labelHouse">House</button>
            <button class="answer-option" type="button" data-answer="labelFish" data-i18n="labelFish">Fish</button>
          </div>
        </div>
        <section id="rule-reveal" class="rule-reveal" hidden aria-live="polite">
          <div class="rule-reveal-chips">
            <button id="rules-reveal-chip" class="rule-reveal-chip" type="button">0 rules used</button>
          </div>
          <div id="rules-reveal-panel" class="rule-reveal-card" hidden>
            <div class="rule-reveal-row">
              <span class="rule-reveal-label" data-i18n="rulesYouAnswered">You answered</span>
              <span id="player-answer-value" class="rule-reveal-value">-</span>
            </div>
            <p id="player-status" class="player-status">-</p>
            <ul id="rules-applied-list" class="rules-applied-list"></ul>
          </div>
        </section>
        <section id="rule-final-question" class="rule-final-question" hidden aria-live="polite">
          <h3 class="rule-final-title" data-i18n="rulesFinalQuestion">How does this AI make decisions?</h3>
          <div class="answer-options answer-options-final" role="list">
            <button class="answer-option final-answer-option" type="button" data-final-answer="understands" data-i18n="rulesFinalOptionUnderstand">It understands what a house is</button>
            <button class="answer-option final-answer-option" type="button" data-final-answer="shapes" data-i18n="rulesFinalOptionShapes">It checks for specific shapes</button>
            <button class="answer-option final-answer-option" type="button" data-final-answer="random" data-i18n="rulesFinalOptionRandom">It guesses randomly</button>
          </div>
        </section>
        <section id="rule-feedback-overlay" class="rule-feedback-overlay" hidden aria-live="polite">
          <div id="rule-feedback-card" class="rule-feedback-card" data-state="correct">
            <p id="rule-feedback-result" class="rule-feedback-result">Correct</p>
            <div class="rule-feedback-answers">
              <p class="rule-feedback-line">
                <span class="rule-feedback-label" data-i18n="rulesYouAnswered">You answered</span>
                <span id="rule-feedback-player" class="rule-feedback-value">House</span>
              </p>
              <p class="rule-feedback-line">
                <span class="rule-feedback-label" data-i18n="rulesAiAnswered">The AI answered</span>
                <span id="rule-feedback-ai" class="rule-feedback-value">Fish</span>
              </p>
            </div>
            <p id="rule-feedback-hint" class="rule-feedback-hint">Starting the next round...</p>
            <button id="rule-feedback-next-btn" class="rule-feedback-next-btn" type="button">Next drawing</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="scripts/translations.js"></script>
  <script src="scripts/script.js"></script>
  <script src="scripts/rule-based-ai-samples.js"></script>
  <script src="scripts/rule-based-ai.js"></script>
</body>
</html>
